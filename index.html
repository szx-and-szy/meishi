<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meishi 校园餐饮点评</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">校园餐饮点评</p>
          <h1>Meishi</h1>
        </div>
        <label class="location-picker">
          <span>位置</span>
          <select id="locationSelect"></select>
        </label>
      </header>

      <main class="content">
        <section class="hero card">
          <div>
            <p class="eyebrow">GitHub Pages + Supabase</p>
            <h2>面向校园餐饮场景的移动端 MVP</h2>
            <p>
              游客可浏览商家与评价；登录用户可上传商家、评价、举报与反馈；管理员可审核商家、处理举报与重置密码。
            </p>
          </div>
          <div class="hero-actions">
            <button id="loginButton" class="primary">学号登录</button>
            <button id="merchantButton" class="secondary">上传商家</button>
          </div>
        </section>

        <section class="card filters">
          <input id="searchInput" type="search" placeholder="搜索商家名称" maxlength="20" />
          <div class="stats-grid" id="platformStats"></div>
        </section>

        <section>
          <div class="section-heading">
            <h2>美食列表</h2>
            <p>按贝叶斯评分排序</p>
          </div>
          <div id="merchantList" class="merchant-list"></div>
        </section>

        <section class="card detail-panel">
          <div class="section-heading">
            <h2>商家详情</h2>
            <p>含图片、评分统计、评价筛选与举报入口</p>
          </div>
          <div id="merchantDetail" class="merchant-detail empty-state">
            请选择一家商家查看详情。
          </div>
        </section>

        <section class="grid-2">
          <article class="card">
            <div class="section-heading">
              <h2>个人中心</h2>
              <p>未登录时跳转登录</p>
            </div>
            <div id="profilePanel" class="panel-stack"></div>
          </article>

          <article class="card">
            <div class="section-heading">
              <h2>管理员工作台</h2>
              <p>审核商家、处理举报、重置密码</p>
            </div>
            <div id="adminPanel" class="panel-stack"></div>
          </article>
        </section>
      </main>

      <nav class="bottom-nav">
        <a class="active" href="#">美食</a>
        <a href="#profilePanel">个人中心</a>
      </nav>
    </div>

    <dialog id="authDialog">
      <form method="dialog" class="dialog-form">
        <h3>学号登录 / 首次注册</h3>
        <label>
          学号
          <input id="studentIdInput" type="text" inputmode="numeric" placeholder="20230001" />
        </label>
        <label>
          昵称
          <input id="nicknameInput" type="text" maxlength="20" placeholder="首次注册时填写" />
        </label>
        <p class="hint">规则：8 位数字，前四位为 2020–2029。忘记密码请联系管理员 QQ 3425749029。</p>
        <menu>
          <button value="cancel">取消</button>
          <button id="confirmLogin" value="default" class="primary">确认</button>
        </menu>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
