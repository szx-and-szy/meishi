    <dialog id="authDialog">
      <form method="dialog" class="dialog-form">
        <div class="dialog-header">

          <button id="openRegisterButton" type="button" class="secondary">注册</button>
        </div>
        <label>
          学号
          <input id="studentIdInput" type="text" inputmode="numeric" placeholder="请输入学号" />
        </label>
        <label>
          密码
          <input id="passwordInput" type="password" placeholder="请输入密码" />
        </label>
        <menu class="auth-buttons">
          <button id="forgotPasswordButton" type="button" class="link-button">忘记密码</button>
          <button id="confirmLogin" value="default" class="primary login-btn">登录</button>
        </menu>
      </form>
    </dialog>

    <dialog id="registerDialog">
      <form method="dialog" class="dialog-form">
        <h3>注册</h3>
        <label>
          昵称
          <input id="registerNicknameInput" type="text" maxlength="20" placeholder="请输入昵称" />
        </label>
        <label>
          学号
          <input id="registerStudentIdInput" type="text" inputmode="numeric" placeholder="请输入学号" />
        </label>
        <label>
          密码
          <input id="registerPasswordInput" type="password" placeholder="请输入密码" />
        </label>
        <menu class="dialog-buttons">
          <button value="cancel" class="outline">取消</button>
          <button id="confirmRegister" value="default" class="primary">注册</button>
        </menu>
      </form>
    </dialog>

    <dialog id="forgotPasswordDialog">
      <form method="dialog" class="dialog-form">
        <h3>忘记密码</h3>
        <p>请联系管理员QQ：安财经济学院融媒体中心3425749029</p>
        <menu>
          <button value="default" class="primary">知道了</button>
        </menu>
      </form>
    </dialog>

    <dialog id="reviewDialog">
      <form method="dialog" class="dialog-form">
        <h3>发布评价</h3>
        <label>
          评分
          <div class="rating-selector" id="ratingSelector">
            <span class="rating-star-empty" data-value="1"></span>
            <span class="rating-star-empty" data-value="2"></span>
            <span class="rating-star-empty" data-value="3"></span>
            <span class="rating-star-empty" data-value="4"></span>
            <span class="rating-star-empty" data-value="5"></span>
          </div>
          <input type="hidden" id="reviewRating" value="5" />
        </label>
        <label>
          评价内容（可选）
          <textarea id="reviewContent" rows="4" maxlength="500" placeholder="分享你的用餐体验..."></textarea>
        </label>
        <menu class="dialog-buttons">
          <button value="cancel" class="outline">取消</button>
          <button id="confirmReview" value="default" class="primary">提交</button>
        </menu>
      </form>
    </dialog>

    <dialog id="editProfileDialog">
      <form method="dialog" class="dialog-form">
        <h3>编辑个人资料</h3>
        <label>
          新昵称
          <input id="editNickname" type="text" maxlength="20" placeholder="请输入新昵称" />
        </label>
        <hr />
        <label>
          当前密码
          <input id="currentPassword" type="password" placeholder="请输入当前密码" />
        </label>
        <label>
          新密码
          <input id="newPassword" type="password" placeholder="请输入新密码" />
        </label>
        <label>
          确认新密码
          <input id="confirmNewPassword" type="password" placeholder="请再次输入新密码" />
        </label>
        <menu class="dialog-buttons">
          <button value="cancel" class="outline">取消</button>
          <button id="confirmEditProfile" value="default" class="primary">保存</button>
        </menu>
      </form>
    </dialog>

    <dialog id="imageViewerDialog">

        <img id="imageViewerImage" src="" alt="大图预览" onclick="event.stopPropagation()" />
