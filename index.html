<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校园餐饮</title>
    <link rel="stylesheet" href="styles.css" />
    <script>
      window.__SUPABASE_CONFIG__ = window.__SUPABASE_CONFIG__ || {

        emailDomain: "meishi.local",
      };

  </head>
  <body>
    <div class="app-shell">
      <header id="topbar" class="topbar card">
        <input id="searchInput" type="search" placeholder="搜索商家名称" maxlength="20" />
        <label id="locationBar" class="location-picker">
          <span>位置</span>
          <select id="locationSelect"></select>
        </label>
      </header>

      <main class="content">
        <section id="foodView" class="view-panel panel-stack" data-view="food">
          <section>
            <div class="section-heading">
              <h2>美食列表</h2>
            </div>
            <div id="merchantList" class="merchant-list"></div>
          </section>
        </section>

        <section id="detailView" class="view-panel panel-stack is-hidden" data-view="detail">
          <section class="card detail-panel">
            <div class="section-heading">
              <h2>商家详情</h2>
            </div>
            <div id="merchantDetail" class="merchant-detail empty-state">
              请选择一家商家查看详情。
            </div>
          </section>
        </section>

        <section id="profileView" class="view-panel panel-stack is-hidden" data-view="profile">
          <article class="card">
            <div class="section-heading">
              <h2>个人中心</h2>
            </div>
            <div id="profilePanel" class="panel-stack"></div>
          </article>
        </section>

        <section id="adminView" class="view-panel panel-stack is-hidden" data-view="admin">
          <article class="card">
            <div class="section-heading">
              <h2>管理员工作台</h2>
              <p>审核商家、处理举报、重置密码</p>
            </div>
            <div id="adminPanel" class="panel-stack"></div>
          </article>
        </section>
      </main>

      <nav class="bottom-nav">
        <button id="foodTabButton" class="nav-tab active" data-target="food">美食</button>
        <button id="profileTabButton" class="nav-tab" data-target="profile">个人中心</button>
      </nav>
    </div>

    <dialog id="authDialog">
      <form method="dialog" class="dialog-form">
        <h3>学号登录</h3>
        <label>
          学号
          <input id="studentIdInput" type="text" inputmode="numeric" placeholder="20230001" />
        </label>
        <label>
          密码
          <input id="passwordInput" type="password" placeholder="请输入密码" />
        </label>
        <menu>
          <button id="forgotPasswordButton" type="button" class="secondary">忘记密码</button>
          <button id="openRegisterButton" type="button" class="secondary">注册</button>
          <button id="confirmLogin" value="default" class="primary">登录</button>
        </menu>
      </form>
    </dialog>

    <dialog id="registerDialog">
      <form method="dialog" class="dialog-form">
        <h3>注册</h3>
        <label>
          昵称
          <input id="registerNicknameInput" type="text" maxlength="20" placeholder="请输入昵称" />
        </label>
        <label>
          学号
          <input id="registerStudentIdInput" type="text" inputmode="numeric" placeholder="20230001" />
        </label>
        <label>
          密码
          <input id="registerPasswordInput" type="password" placeholder="请输入密码" />
        </label>
        <menu>
          <button value="cancel">取消</button>
          <button id="confirmRegister" value="default" class="primary">注册</button>
        </menu>
      </form>
    </dialog>

    <dialog id="forgotPasswordDialog">
      <form method="dialog" class="dialog-form">
        <h3>忘记密码</h3>
        <p>请联系管理员QQ：安财经济学院融媒体中心3425749029</p>
        <menu>
          <button value="default" class="primary">知道了</button>
        </menu>
      </form>
    </dialog>

    <dialog id="merchantUploadDialog">
      <form method="dialog" class="dialog-form">
        <h3>上传商家</h3>
        <label>
          商家名称
          <input id="uploadMerchantName" type="text" maxlength="20" placeholder="请输入商家名称" />
        </label>
        <label>
          位置
          <select id="uploadMerchantLocation"></select>
        </label>
        <label>
          封面图片URL（可选）
          <input id="uploadMerchantCover" type="text" placeholder="https://example.com/image.jpg" />
        </label>
        <label>
          描述（可选）
          <textarea id="uploadMerchantDesc" rows="3" placeholder="简单描述这家商家..."></textarea>
        </label>
        <menu>
          <button value="cancel">取消</button>
          <button id="confirmMerchantUpload" value="default" class="primary">提交</button>
        </menu>
      </form>
    </dialog>

    <dialog id="reviewDialog">
      <form method="dialog" class="dialog-form">
        <h3>发布评价</h3>
        <label>
          评分
          <select id="reviewRating">
            <option value="5">★★★★★ 5分</option>
            <option value="4">★★★★☆ 4分</option>
            <option value="3">★★★☆☆ 3分</option>
            <option value="2">★★☆☆☆ 2分</option>
            <option value="1">★☆☆☆☆ 1分</option>
          </select>
        </label>
        <label>
          评价内容（可选）
          <textarea id="reviewContent" rows="4" maxlength="500" placeholder="分享你的用餐体验..."></textarea>
        </label>
        <menu>
          <button value="cancel">取消</button>
          <button id="confirmReview" value="default" class="primary">提交</button>
        </menu>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
